<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h2>Let's Chat.</h2>
      <h2>Tell me about your project</h2>
    </div>

    <form action="" method="get">
      <div class="wrapper">
        <div class="formfullname">
          <label for="fullname">Full name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            required
            placeholder="Full name"
          />
        </div>

        <div class="emailaddress">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="nama@example.com"
          />
        </div>

        <div class="contactno">
          <label for="contact">Contact No</label>
          <input
            type="tel"
            id="contact"
            name="contact"
            required
            placeholder="85173018956"
          />
        </div>

        <div class="address">
          <label for="address">Address</label>
          <textarea
            name="address"
            id="address"
            placeholder="Enter your address"
          ></textarea>
        </div>
        <div class="company">
          <label for="company-based">Where is your company based?</label>
          <select
            name="company-based"
            id="company-based"
            placeholder="Select your country"
          >
            <option value="indonesia">Indonesia</option>
            <option value="malaysia">Malaysia</option>
            <option value="philippines">Philippines</option>
            <option value="singapore">Singapore</option>
          </select>
          <input
            type="text"
            id="company-based"
            name="company-based"
            placeholder="City"
          />
          <input
            type="text"
            id="company-based"
            name="company-based"
            placeholder="State"
          />
          <input
            type="text"
            id="company-based"
            name="company-based"
            placeholder="Zip-code"
          />
        </div>
        <div class="date">
          <label for="date">Date picker</label>
          <input type="date" id="date" name="date" placeholder="DD-MM-YYYY" />
        </div>

        <div class="time">
          <label for="time">Time picker</label>
          <input type="time" id="time" name="time" />
        </div>
      </div>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
