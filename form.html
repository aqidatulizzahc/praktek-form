<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
  </head>
  <body>
    <h2>Let's Chat.</h2>
    <h2>Tell me about your project</h2>

    <form action="" method="get">
      <div class="wrapper">
        <label for="fullname">Full name</label>
        <input
          type="text"
          id="fullname"
          name="fullname"
          required
          placeholder="Full name"
        />

        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="nama@example.com"
        />

        <label for="contact">Contact No</label>
        <input
          type="tel"
          id="contact"
          name="contact"
          required
          placeholder="85173018956"
        />

        <label for="address">Address</label>
        <textarea
          name="address"
          id="address"
          placeholder="Enter your address"
        ></textarea>

        <label for="company-based">Where is your company based?</label>
        <select name="company-based" id="company-based"></select>
        <input
          type="text"
          id="company-based"
          name="company-based"
          placeholder="City"
        />
        <input
          type="text"
          id="company-based"
          name="company-based"
          placeholder="State"
        />
        <input
          type="text"
          id="company-based"
          name="company-based"
          placeholder="Zip-code"
        />

        <label for="date">Date picker</label>
        <input type="date" id="date" name="date" placeholder="DD-MM-YYYY" />

        <label for="">Time picker</label>
        <label for="">Dropdown</label>
      </div>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
